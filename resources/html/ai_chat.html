<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI问答 - 国防安全科普教育软件</title>
    <link rel="stylesheet" href="qrc:/resources/css/style.css">
    <link rel="stylesheet" href="qrc:/resources/css/animations.css">
    <style>
        .chat-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
            height: calc(100vh - 200px);
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .chat-header h1 {
            font-size: 2rem;
            background: var(--gradient-gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 1.5rem;
            background: var(--bg-card);
            border: 1px solid rgba(196, 30, 58, 0.3);
            border-radius: 10px;
            margin-bottom: 1rem;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #666;
            transition: all 0.3s ease;
        }

        .status-dot.online {
            background: #00ff00;
            box-shadow: 0 0 10px #00ff00;
            animation: pulse 2s ease-in-out infinite;
        }

        .status-dot.offline {
            background: #ff0000;
        }

        .model-selector {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .model-selector select {
            background: var(--bg-dark);
            color: var(--text-primary);
            border: 1px solid var(--primary-color);
            padding: 0.3rem 0.8rem;
            border-radius: 5px;
            font-family: inherit;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            background: var(--bg-card);
            border: 1px solid rgba(196, 30, 58, 0.3);
            border-radius: 15px;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }

        .message {
            margin-bottom: 1.5rem;
            animation: slideUp 0.3s ease-out;
        }

        .message-user {
            text-align: right;
        }

        .message-ai {
            text-align: left;
        }

        .message-bubble {
            display: inline-block;
            max-width: 80%;
            padding: 1rem 1.5rem;
            border-radius: 15px;
            line-height: 1.6;
        }

        .message-user .message-bubble {
            background: var(--gradient-red);
            color: white;
            border-bottom-right-radius: 5px;
        }

        .message-ai .message-bubble {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(196, 30, 58, 0.3);
            border-bottom-left-radius: 5px;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin: 0 0.5rem;
            font-size: 1.2rem;
        }

        .message-user .message-avatar {
            background: var(--gradient-red);
        }

        .message-ai .message-avatar {
            background: var(--gradient-gold);
        }

        .typing-indicator {
            display: none;
            padding: 1rem;
            color: var(--text-secondary);
        }

        .typing-indicator.active {
            display: block;
        }

        .typing-dots {
            display: inline-flex;
            gap: 0.3rem;
        }

        .typing-dots span {
            width: 8px;
            height: 8px;
            background: var(--primary-color);
            border-radius: 50%;
            animation: typingBounce 1.4s ease-in-out infinite both;
        }

        .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
        .typing-dots span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes typingBounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .chat-input-area {
            display: flex;
            gap: 1rem;
        }

        .chat-input {
            flex: 1;
            padding: 1rem 1.5rem;
            background: var(--bg-card);
            border: 1px solid rgba(196, 30, 58, 0.3);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: inherit;
            resize: none;
            min-height: 50px;
            max-height: 150px;
        }

        .chat-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: var(--shadow-glow);
        }

        .send-btn {
            padding: 1rem 2rem;
            background: var(--gradient-red);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .send-btn:hover {
            box-shadow: var(--shadow-glow);
            transform: translateY(-2px);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .quick-questions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .quick-question {
            padding: 0.5rem 1rem;
            background: rgba(196, 30, 58, 0.2);
            border: 1px solid rgba(196, 30, 58, 0.3);
            border-radius: 20px;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .quick-question:hover {
            background: var(--gradient-red);
            border-color: var(--primary-color);
        }

        .welcome-message {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        .welcome-message h2 {
            color: var(--accent-color);
            margin-bottom: 1rem;
        }

        .error-message {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid rgba(255, 0, 0, 0.3);
            color: #ff6666;
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1rem;
            display: none;
        }

        .error-message.show {
            display: block;
            animation: shake 0.5s ease-in-out;
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>

    <nav class="navbar">
        <div class="logo">
            <div class="logo-icon">★</div>
            <div class="logo-text">国防科普</div>
        </div>
        <ul class="nav-links">
            <li><a href="#" onclick="navigate('main')">首页</a></li>
            <li><a href="#" onclick="navigate('timeline')">时间轴</a></li>
            <li><a href="#" onclick="navigate('ai_chat')">AI问答</a></li>
            <li><a href="#" onclick="navigate('settings')">设置</a></li>
        </ul>
    </nav>

    <div class="chat-container">
        <div class="chat-header slide-up">
            <h1>AI 国防知识助手</h1>
            <p style="color: var(--text-secondary);">基于本地Ollama大模型，智能回答国防相关问题</p>
        </div>

        <div class="status-bar slide-up delay-1">
            <div class="status-indicator">
                <div class="status-dot offline" id="statusDot"></div>
                <span id="statusText">检查Ollama服务...</span>
            </div>
            <div class="model-selector">
                <label>模型:</label>
                <select id="modelSelect">
                    <option value="">默认模型</option>
                </select>
                <button class="btn btn-primary" onclick="checkOllama()" style="padding: 0.3rem 1rem; font-size: 0.9rem;">刷新</button>
            </div>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <div class="quick-questions slide-up delay-2" id="quickQuestions">
            <span style="color: var(--text-secondary); margin-right: 0.5rem;">快速提问:</span>
            <span class="quick-question" onclick="sendQuickQuestion('什么是国防？')">什么是国防？</span>
            <span class="quick-question" onclick="sendQuickQuestion('中国国防政策是什么？')">中国国防政策是什么？</span>
            <span class="quick-question" onclick="sendQuickQuestion('介绍一下歼-20战斗机')">介绍一下歼-20战斗机</span>
            <span class="quick-question" onclick="sendQuickQuestion('中国有几艘航母？')">中国有几艘航母？</span>
            <span class="quick-question" onclick="sendQuickQuestion('什么是军民融合？')">什么是军民融合？</span>
        </div>

        <div class="chat-messages slide-up delay-3" id="chatMessages">
            <div class="welcome-message">
                <h2>👋 欢迎来到国防知识AI助手</h2>
                <p>我可以帮您解答关于国防历史、军事科技、国防政策等方面的问题。</p>
                <p style="margin-top: 1rem; font-size: 0.9rem;">请确保已安装并运行Ollama服务</p>
            </div>
        </div>

        <div class="typing-indicator" id="typingIndicator">
            <div class="typing-dots">
                <span></span>
                <span></span>
                <span></span>
            </div>
            AI正在思考...
        </div>

        <div class="chat-input-area slide-up delay-4">
            <textarea class="chat-input" id="chatInput" placeholder="请输入您的问题..." rows="1"></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                <span>发送</span>
                <span>➤</span>
            </button>
        </div>
    </div>

    <script src="qrc:/qtwebchannel/qwebchannel.js"></script>
    <script src="qrc:/resources/js/app.js"></script>
    <script src="qrc:/resources/js/chat.js"></script>
    <script>
        // 页面加载时检查Ollama状态
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(checkOllama, 500);
        });

        // 回车发送
        document.getElementById('chatInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // 自动调整输入框高度
        document.getElementById('chatInput').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 150) + 'px';
        });
    </script>
</body>
</html>
